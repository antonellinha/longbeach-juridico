<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Protocolos & Modelos - Long Beach</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #cbd5e1; font-family: system-ui, -apple-system, sans-serif; padding: 2rem 1rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h1 { color: #38bdf8; font-size: 2.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        .card { background-color: #1e293b; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); margin-bottom: 1.5rem; }
        h2 { font-size: 1.125rem; font-weight: 600; color: #38bdf8; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .grupo-campo { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #94a3b8; margin-bottom: 0.35rem; }
        input, select, textarea { width: 100%; background-color: #334155; border: 1px solid #475569; border-radius: 0.5rem; padding: 0.65rem; font-size: 0.875rem; color: #fff; outline: none; }
        .seccao-divisor { grid-column: span 1 / span 1; border-bottom: 1px solid #334155; padding-bottom: 0.35rem; margin-top: 1.25rem; margin-bottom: 0.25rem; color: #38bdf8; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; }
        @media (min-width: 640px) { .seccao-divisor { grid-column: span 2 / span 2; } }
        .btn-gerar { background-color: #059669; color: white; width: 100%; padding: 0.85rem; border: none; border-radius: 0.5rem; font-weight: 700; cursor: pointer; margin-top: 1rem; text-transform: uppercase; }
        .btn-copiar { background-color: #334155; color: white; border: 1px solid #475569; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; cursor: pointer; }
        #output-template { background-color: #090d16; color: #34d399; font-family: monospace; padding: 1rem; border-radius: 0.5rem; width: 100%; height: 350px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>Sistema de Protocolos</h1></header>
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem;">
            <div>
                <div class="card">
                    <h2>⚖️ Advogado</h2>
                    <input type="text" id="adv-nome" placeholder="Dr. Nome">
                </div>
                <div class="card">
                    <label>Serviço:</label>
                    <select id="select-template" onchange="alternarCampos()">
                        <option value="1">1. Troca de Nome</option>
                        <option value="2_adocao">2. Adoção</option>
                        <option value="2_nascimento">2. Nascimento</option>
                        <option value="3">3. Casamento</option>
                        <option value="4">4. CNPJ</option>
                        <option value="5">5. Limpeza de Ficha</option>
                        <option value="6">6. Porte de Arma</option>
                    </select>
                </div>
                <div id="area-ocr" class="card hidden">
                    <h2 style="color: #eab308;">🔍 Análise de Ficha</h2>
                    <input type="file" id="foto-crimes" accept="image/*" onchange="processarImagem(event)">
                </div>
            </div>
            <div>
                <div class="card">
                    <h2>Dados</h2>
                    <div id="campos-dinamicos" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;"></div>
                    <button class="btn-gerar" onclick="gerarTemplate()">Gerar Modelo</button>
                </div>
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <h2>Modelo</h2>
                        <button class="btn-copiar" onclick="enviarDiscord()">🚀 Postar no Discord</button>
                    </div>
                    <textarea id="output-template" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1518468540628340766/vUnBae5tnqrI0GpJ0jNP1n6DA61hMCJGzlESkJIlYp7XtTIiS-CQh8LsXuGq8i_urtvm";

        const layouts = {
            "1": [
                { type: 'seccao', label: 'Dados' },
                { id: 'nome_atual', label: 'Nome Atual', placeholder: 'NOME' },
                { id: 'nome_retificado', label: 'Nome Retificado', placeholder: 'NOME' },
                { id: 'id_req', label: 'ID', placeholder: 'ID' },
                { id: 'telefone', label: 'Telefone', placeholder: 'TEL' },
                { id: 'ficha_limpa', label: 'Ficha Limpa?', type: 'select', options: ['SIM', 'NÃO'] },
                { id: 'pena_atual', label: 'Pena (Se precisar limpeza)', placeholder: '0M' }
            ],
            "2_adocao": [
                { type: 'seccao', label: 'Criança' },
                { id: 'nome_crianca', label: 'Nome', placeholder: 'NOME' },
                { id: 'id_req', label: 'ID', placeholder: 'ID' },
                { type: 'seccao', label: 'Responsáveis' },
                { id: 'pai_mae_1', label: 'Responsável 1', placeholder: 'NOME' },
                { id: 'pai_mae_2', label: 'Responsável 2', placeholder: 'NOME' },
                { type: 'seccao', label: 'Valores' },
                { id: 'valor', label: 'Valor Total', placeholder: '1000' },
                { id: 'valor_jur', label: 'Jurídico (50%)', placeholder: '0', readonly: true },
                { id: 'valor_adv', label: 'Advogado (50%)', placeholder: '0', readonly: true }
            ],
            "6": [
                { type: 'seccao', label: 'Requerente' },
                { id: 'nome_completo', label: 'Nome', placeholder: 'NOME' },
                { id: 'id_req', label: 'ID', placeholder: 'ID' },
                { id: 'ficha_limpa', label: 'Ficha Limpa?', type: 'select', options: ['SIM', 'NÃO'] },
                { id: 'pena_atual', label: 'Pena (Se precisar limpeza)', placeholder: '0M' },
                { id: 'armamento', label: 'Armamento', placeholder: 'ARMAS' }
            ]
        };

        function alternarCampos() {
            const escolha = document.getElementById('select-template').value;
            const container = document.getElementById('campos-dinamicos');
            container.innerHTML = '';
            
            // Lógica de visualização do OCR
            const areaOcr = document.getElementById('area-ocr');
            areaOcr.classList.toggle('hidden', !['1','5','6'].includes(escolha));

            layouts[escolha]?.forEach(c => {
                if(c.type === 'seccao') {
                    const div = document.createElement('div');
                    div.className = 'seccao-divisor';
                    div.innerText = c.label;
                    container.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.innerHTML = `<label>${c.label}</label>${c.type==='select'?`<select id="input-${c.id}">${c.options.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`:`<input type="text" id="input-${c.id}" placeholder="${c.placeholder||''}" ${c.readonly?'readonly':''}>`}`;
                    container.appendChild(div);
                }
            });
        }

        document.getElementById('campos-dinamicos').addEventListener('input', () => {
            const v = parseInt(document.getElementById('input-valor')?.value.replace(/[^0-9]/g,''))||0;
            if(document.getElementById('input-valor_adv')) document.getElementById('input-valor_adv').value = Math.round(v*0.5).toLocaleString('pt-BR');
            if(document.getElementById('input-valor_jur')) document.getElementById('input-valor_jur').value = Math.round(v*0.5).toLocaleString('pt-BR');
        });

        function gerarTemplate() {
            const e = document.getElementById('select-template').value;
            const adv = document.getElementById('adv-nome').value;
            let res = `**ADVOGADO:** ${adv}\n\n\`\`\`md\n`;
            document.querySelectorAll('#campos-dinamicos input, #campos-dinamicos select').forEach(el => {
                const label = el.parentElement.querySelector('label')?.innerText || '';
                if(label) res += `[${label.toUpperCase()}][${el.value.toUpperCase()}]\n`;
            });
            res += "\n\`\`\`";
            document.getElementById('output-template').value = res;
        }

        async function enviarDiscord() {
            const content = document.getElementById('output-template').value;
            await fetch(webhookUrl, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: content })
            });
            alert('Enviado!');
        }

        function processarImagem(e) {
            Tesseract.recognize(e.target.files[0],'por').then(d=>{
                let t=0; [...d.data.text.matchAll(/(\d+)M/g)].forEach(m=>t+=parseInt(m[1]));
                if(document.getElementById('input-pena_atual')) document.getElementById('input-pena_atual').value = t+'M';
            });
        }
        alternarCampos();
    </script>
</body>
</html>
