<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Protocolos & Modelos - Long Beach</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #cbd5e1; font-family: system-ui, -apple-system, sans-serif; padding: 2rem 1rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h1 { color: #38bdf8; font-size: 2.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        header p { color: #94a3b8; font-size: 0.875rem; }
        .grid-principal { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 1024px) { .grid-principal { grid-template-columns: 1fr 2fr; } }
        .card { background-color: #1e293b; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); margin-bottom: 1.5rem; }
        h2 { font-size: 1.125rem; font-weight: 600; color: #38bdf8; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .grupo-campo { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #94a3b8; margin-bottom: 0.35rem; }
        input, select, textarea { width: 100%; background-color: #334155; border: 1px solid #475569; border-radius: 0.5rem; padding: 0.65rem; font-size: 0.875rem; color: #fff; outline: none; }
        input:focus { border-color: #38bdf8; }
        .campos-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 640px) { .campos-grid { grid-template-columns: 1fr 1fr; } }
        .full-width { grid-column: span 1 / span 1; }
        @media (min-width: 640px) { .full-width { grid-column: span 2 / span 2; } }
        .seccao-divisor { grid-column: span 1 / span 1; border-bottom: 1px solid #334155; padding-bottom: 0.35rem; margin-top: 1.25rem; margin-bottom: 0.25rem; }
        @media (min-width: 640px) { .seccao-divisor { grid-column: span 2 / span 2; } }
        .seccao-divisor h3 { color: #38bdf8; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; }
        .btn-gerar { background-color: #059669; color: white; width: 100%; padding: 0.85rem; border: none; border-radius: 0.5rem; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
        .btn-gerar:hover { background-color: #10b981; }
        .flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .btn-copiar { background-color: #334155; color: white; border: 1px solid #475569; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; cursor: pointer; }
        #output-template { background-color: #090d16; color: #34d399; font-family: monospace; font-size: 0.875rem; padding: 1rem; border-radius: 0.5rem; border: 1px solid #1e293b; resize: vertical; height: 350px; }
        .btn-upload { background-color: #2563eb; color: white; font-size: 0.75rem; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .hidden { display: none !important; }
        .status-ia { color: #eab308; font-size: 0.75rem; margin-top: 0.5rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sistema de Protocolos & Modelos</h1>
            <p>Long Beach Judicial Department</p>
        </header>

        <div class="grid-principal">
            <div>
                <div class="card">
                    <h2>⚖️ Identificação do Advogado</h2>
                    <input type="text" id="adv-nome" placeholder="Ex: Dr. John Doe">
                </div>
                <div class="card">
                    <label>Selecione o Serviço:</label>
                    <select id="select-template" onchange="alternarCampos()">
                        <option value="1">1. Troca de Nome</option>
                        <option value="2_adocao">2. Adoção</option>
                        <option value="2_nascimento">2. Nascimento</option>
                        <option value="3">3. Casamento</option>
                        <option value="4">4. CNPJ (Abertura/Renovação)</option>
                        <option value="5">5. Limpeza de Ficha</option>
                        <option value="6">6. Porte de Arma</option>
                    </select>
                </div>
                <div id="area-ocr" class="card hidden">
                    <h2 style="color: #eab308;">🔍 Análise Inteligente</h2>
                    <label class="btn-upload">Escolher Ficheiro<input type="file" id="foto-crimes" accept="image/*" class="hidden" onchange="processarImagem(event)"></label>
                    <div id="status-ocr" class="status-ia"></div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h2 style="color: white;">Dados do Requerimento</h2>
                    <div id="campos-dinamicos" class="campos-grid"></div>
                    <button onclick="gerarTemplate()" class="btn-gerar">Gerar Modelo Formatado</button>
                </div>
                <div class="card">
                    <div class="flex-header">
                        <h2>Modelo Pronto</h2>
                        <button onclick="enviarParaDiscord()" style="background-color: #5865F2; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;">🚀 Postar</button>
                        <button onclick="copiarTexto()" class="btn-copiar">📄 Copiar</button>
                    </div>
                    <textarea id="output-template" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const webhookPadrao = "https://discord.com/api/webhooks/1518468540628340766/vUnBae5tnqrI0GpJ0jNP1n6DA61hMCJGzlESkJIlYp7XtTIiS-CQh8LsXuGq8i_urtvm";
        
        const layouts = {
            "1": [ { id: 'nome_atual', label: 'Nome Atual', placeholder: 'Nome' }, { id: 'nome_retificado', label: 'Nome Retificado', placeholder: 'Nome' }, { id: 'id_req', label: 'ID', placeholder: 'ID' }, { id: 'telefone', label: 'Telefone', placeholder: 'XXXX' }, { id: 'motivo', label: 'Motivo', placeholder: 'XXXX' }, { id: 'data', label: 'Data', valorFixo: '21/06/2026' } ],
            "2_adocao": [ { id: 'nome_crianca', label: 'Nome Criança|Adulto' }, { id: 'nome_retificado', label: 'Nome Retificado' }, { id: 'id_req', label: 'ID' }, { id: 'pai_mae_1', label: 'Nome Responsável 1' }, { id: 'id_pai_mae_1', label: 'ID Resp 1' }, { id: 'pai_mae_2', label: 'Nome Responsável 2' }, { id: 'id_pai_mae_2', label: 'ID Resp 2' }, { id: 'data_adocao', label: 'Data Adoção', valorFixo: '21/06/2026' }, { id: 'valor', label: 'Valor Total' }, { id: 'valor_jur', label: 'Valor Jurídico', readonly: true }, { id: 'valor_adv', label: 'Valor Advogado', readonly: true }, { id: 'data_req', label: 'Data Req', valorFixo: '21/06/2026' } ],
            "2_nascimento": [ { id: 'nome_crianca', label: 'Nome Criança' }, { id: 'id_crianca', label: 'ID Criança' }, { id: 'pai_mae_1', label: 'Pai/Mãe 1' }, { id: 'id_pai_mae_1', label: 'ID PAI/MÃE 1' }, { id: 'pai_mae_2', label: 'Pai/Mãe 2' }, { id: 'id_pai_mae_2', label: 'ID PAI/MÃE 2' }, { id: 'medico', label: 'Nome Médico' }, { id: 'id_medico', label: 'ID Médico' }, { id: 'data_nasc', label: 'Data Nasc', valorFixo: '21/06/2026' }, { id: 'valor', label: 'Valor Total' }, { id: 'valor_jur', label: 'Valor Jurídico', readonly: true }, { id: 'valor_adv', label: 'Valor Advogado', readonly: true } ],
            "3": [ { id: 'c1_nome', label: 'Nome Cônjuge 1' }, { id: 'c1_id', label: 'ID Cônjuge 1' }, { id: 'c1_tel', label: 'Tel Cônjuge 1' }, { id: 'c1_sexo', label: 'Sexo Cônjuge 1' }, { id: 'c2_nome', label: 'Nome Cônjuge 2' }, { id: 'c2_id', label: 'ID Cônjuge 2' }, { id: 'c2_tel', label: 'Tel Cônjuge 2' }, { id: 'c2_sexo', label: 'Sexo Cônjuge 2' }, { id: 'data_casamento', label: 'Data Casamento', valorFixo: '21/06/2026' }, { id: 'c1_nome_ret', label: 'Nome Retificado 1' }, { id: 'c1_id_ret', label: 'ID Retificado 1' }, { id: 'c2_nome_ret', label: 'Nome Retificado 2' }, { id: 'c2_id_ret', label: 'ID Retificado 2' }, { id: 'valor', label: 'Valor' }, { id: 'valor_jur', label: 'Jurídico', readonly: true }, { id: 'valor_adv', label: 'Advogado', readonly: true } ],
            "4": [ { id: 'empresa', label: 'Empresa' }, { id: 'socio1', label: 'Sócio 01' }, { id: 'id_socio1', label: 'ID Sócio 01' }, { id: 'tel_socio1', label: 'Tel Sócio 01' }, { id: 'socio2', label: 'Sócio 02' }, { id: 'id_socio2', label: 'ID Sócio 02' }, { id: 'tel_socio2', label: 'Tel Sócio 02' }, { id: 'solicitacao', label: 'Solicitação', type: 'select', options: ['ABERTURA', 'RENOVAÇÃO', 'AUMENTO DE FUNCIONARIOS'] }, { id: 'num_func', label: 'Nº Funcionários' }, { id: 'descricao', label: 'Descrição' }, { id: 'mes_vigente', label: 'Mês Vigente', valorFixo: 'Junho/2026' }, { id: 'valor', label: 'Valor' }, { id: 'valor_jur', label: 'Jurídico', readonly: true }, { id: 'valor_adv', label: 'Advogado', readonly: true } ],
            "5": [ { id: 'nome_completo', label: 'Nome Completo' }, { id: 'id_req', label: 'ID' }, { id: 'telefone', label: 'Telefone' }, { id: 'requerimento', label: 'Requerimento (Pena)', readonly: true }, { id: 'motivo', label: 'Motivo' }, { id: 'data', label: 'Data', valorFixo: '23/02/2025' } ],
            "6": [ { id: 'nome_completo', label: 'Nome Completo' }, { id: 'id_req', label: 'ID' }, { id: 'telefone', label: 'Telefone' }, { id: 'ficha_limpa', label: 'Ficha Limpa?', type: 'select', options: ['Sim', 'Não'] }, { id: 'requerimento', label: 'Pena (IA)', readonly: true }, { id: 'armamento', label: 'Armamento' }, { id: 'motivo', label: 'Motivo' }, { id: 'data', label: 'Data', valorFixo: '21/06/2026' } ]
        };

        const nomesRequerimentos = { "1": "TROCA DE NOME", "2_adocao": "ADOÇÃO", "2_nascimento": "NASCIMENTO", "3": "CASAMENTO", "4": "CNPJ", "5": "LIMPEZA DE FICHA", "6": "PORTE DE ARMA" };

        function alternarCampos() {
            const escolha = document.getElementById('select-template').value;
            const container = document.getElementById('campos-dinamicos');
            container.innerHTML = '';
            document.getElementById('area-ocr').classList.toggle('hidden', !["5", "6"].includes(escolha));
            layouts[escolha].forEach(campo => {
                const div = document.createElement('div');
                div.innerHTML = `<label>${campo.label}</label>`;
                if(campo.type === 'select') {
                    const s = document.createElement('select'); s.id = 'input-'+campo.id;
                    campo.options.forEach(o => s.innerHTML += `<option value="${o}">${o}</option>`);
                    div.appendChild(s);
                } else {
                    const i = document.createElement('input'); i.id = 'input-'+campo.id; i.value = campo.valorFixo || ''; if(campo.readonly) i.readOnly = true;
                    div.appendChild(i);
                }
                container.appendChild(div);
            });
        }
        
        document.getElementById('campos-dinamicos').addEventListener('input', () => {
            const val = parseInt(document.getElementById('input-valor')?.value.replace(/[^0-9]/g, '') || 0);
            const tipo = document.getElementById('input-solicitacao')?.value;
            const escolha = document.getElementById('select-template').value;
            let pA = 0.5, pJ = 0.5;
            if (escolha === "4") { pA = (tipo === "RENOVAÇÃO" ? 0.4 : 0.6); pJ = 1 - pA; }
            if(document.getElementById('input-valor_adv')) document.getElementById('input-valor_adv').value = Math.round(val * pA).toLocaleString('pt-PT');
            if(document.getElementById('input-valor_jur')) document.getElementById('input-valor_jur').value = Math.round(val * pJ).toLocaleString('pt-PT');
        });

        function gerarTemplate() {
            const adv = document.getElementById('adv-nome').value;
            let res = `**Advogado:** ${adv}\n\n\`\`\`md\n`;
            document.querySelectorAll('input, select').forEach(el => {
                if(el.id.startsWith('input-')) {
                    const label = el.parentElement.querySelector('label').innerText;
                    res += `[${label.toUpperCase()}][${el.value}]\n`;
                }
            });
            document.getElementById('output-template').value = res + "\`\`\`";
        }

        async function enviarParaDiscord() {
            const template = document.getElementById('output-template').value;
            if(!template) return alert('Gere o template primeiro!');
            await fetch(webhookPadrao, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ embeds: [{ description: template, color: 3719160 }] }) 
            });
            alert('Enviado!');
        }

        function copiarTexto() { document.getElementById('output-template').select(); document.execCommand('copy'); alert('Copiado!'); }
        alternarCampos();
    </script>
</body>
</html>
