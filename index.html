<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Protocolos & Modelos - Long Beach</title>
    <!-- Tesseract.js para leitura OCR local das capturas de ecrã das fichas criminais -->
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #cbd5e1; font-family: system-ui, -apple-system, sans-serif; padding: 2rem 1rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h1 { color: #38bdf8; font-size: 2.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        header p { color: #94a3b8; font-size: 0.875rem; }
        
        .grid-principal { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 1024px) { .grid-principal { grid-template-columns: 1fr 2fr; } }
        
        .card { background-color: #1e293b; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); margin-bottom: 1.5rem; }
        h2 { font-size: 1.125rem; font-weight: 600; color: #38bdf8; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .grupo-campo { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #94a3b8; margin-bottom: 0.35rem; tracking: 0.05em; }
        input, select, textarea { width: 100%; background-color: #334155; border: 1px solid #475569; border-radius: 0.5rem; padding: 0.65rem; font-size: 0.875rem; color: #fff; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #38bdf8; }
        
        .campos-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 640px) { .campos-grid { grid-template-columns: 1fr 1fr; } }
        .full-width { grid-column: span 1 / span 1; }
        @media (min-width: 640px) { .full-width { grid-column: span 2 / span 2; } }
        
        .seccao-divisor { grid-column: span 1 / span 1; border-bottom: 1px solid #334155; padding-bottom: 0.35rem; margin-top: 1.25rem; margin-bottom: 0.25rem; }
        @media (min-width: 640px) { .seccao-divisor { grid-column: span 2 / span 2; } }
        .seccao-divisor h3 { color: #38bdf8; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .btn-gerar { background-color: #059669; color: white; width: 100%; padding: 0.85rem; border: none; border-radius: 0.5rem; font-weight: 700; font-size: 0.875rem; cursor: pointer; margin-top: 1rem; transition: background 0.2s; text-transform: uppercase; }
        .btn-gerar:hover { background-color: #10b981; }
        
        .flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .btn-copiar { background-color: #334155; color: white; border: 1px solid #475569; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .btn-copiar:hover { background-color: #475569; }
        
        #output-template { background-color: #090d16; color: #34d399; font-family: monospace; font-size: 0.875rem; padding: 1rem; border-radius: 0.5rem; border: 1px solid #1e293b; resize: vertical; height: 350px; }
        
        .btn-upload { background-color: #2563eb; color: white; font-size: 0.75rem; font-weight: 700; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; display: inline-block; text-align: center; margin-top: 0.5rem; }
        .btn-upload:hover { background-color: #1d4ed8; }
        .hidden { display: none !important; }
        .status-ia { color: #eab308; font-size: 0.75rem; margin-top: 0.5rem; font-style: italic; font-weight: 500; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sistema de Protocolos & Modelos</h1>
            <p>Long Beach Judicial Department</p>
        </header>

        <div class="grid-principal">
            
            <div>
                <div class="card">
                    <h2>⚖️ Identificação do Advogado</h2>
                    <div class="grupo-campo">
                        <label>Nome do Advogado</label>
                        <input type="text" id="adv-nome" placeholder="Ex: Dr. John Doe">
                    </div>
                </div>

                <div class="card">
                    <div class="grupo-campo">
                        <label>Selecione o Serviço:</label>
                        <select id="select-template" onchange="alternarCampos()">
                            <option value="1">1. Troca de Nome</option>
                            <option value="2_adocao">2. Adoção</option>
                            <option value="2_nascimento">2. Nascimento</option>
                            <option value="3">3. Casamento</option>
                            <option value="4">4. CNPJ (Abertura/Renovação)</option>
                            <option value="5">5. Limpeza de Ficha</option>
                            <option value="6">6. Porte de Arma</option>
                        </select>
                    </div>
                </div>

                <div id="area-ocr" class="card hidden">
                    <h2 style="color: #eab308;">🔍 Análise Inteligente de Ficha</h2>
                    <p style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.5rem;">Carregue a captura de ecrã da ficha criminal para somar os meses automaticamente.</p>
                    <label class="btn-upload">
                        Escolher Ficheiro
                        <input type="file" id="foto-crimes" accept="image/*" class="hidden" onchange="processarImagem(event)">
                    </label>
                    <span id="nome-arquivo" style="font-size: 0.75rem; color: #94a3b8; margin-left: 0.5rem;">Nenhum ficheiro selecionado</span>
                    <div id="status-ocr" class="status-ia"></div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h2 style="color: white; font-size: 1.25rem;">Dados do Requerimento</h2>
                    <div id="campos-dinamicos" class="campos-grid"></div>
                    <button onclick="gerarTemplate()" class="btn-gerar">Gerar Modelo Formatado</button>
                </div>

                <div class="card">
                    <div class="flex-header">
                        <h2>Modelo Pronto</h2>
                        <button onclick="enviarParaDiscord()" style="background-color: #5865F2; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem; font-weight: 600;">🚀 Postar</button>
                        <button onclick="copiarTexto()" class="btn-copiar">📄 Copiar Texto</button>
                    </div>
                    <textarea id="output-template" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const webhookPadrao = "https://discord.com/api/webhooks/1518468540628340766/vUnBae5tnqrI0GpJ0jNP1n6DA61hMCJGzlESkJIlYp7XtTIiS-CQh8LsXuGq8i_urtvm";

        const layouts = {
            "1": [ { id: 'nome_atual', label: 'Nome Atual', placeholder: 'Nome' }, { id: 'nome_retificado', label: 'Nome Retificado', placeholder: 'Nome' }, { id: 'id_req', label: 'ID do Requerente', placeholder: 'XXXX' }, { id: 'telefone', label: 'Telefone', placeholder: 'XXXX' }, { id: 'requerimento', label: 'Requerimento', placeholder: 'TROCA DE NOME', valorFixo: 'TROCA DE NOME' }, { id: 'motivo', label: 'Motivo', placeholder: 'XXXXX/SE HOUVER' }, { id: 'data', label: 'Data', placeholder: 'XX/XX/20XX', valorFixo: '21/06/2026' } ],
            "2_adocao": [ { id: 'nome_crianca', label: 'Nome Criança|Adulto', placeholder: 'Nome' }, { id: 'nome_retificado', label: 'Nome Retificado', placeholder: 'Nome' }, { id: 'id_req', label: 'ID do Requerente', placeholder: 'XXXX' }, { type: 'seccao', label: 'Responsável 1' }, { id: 'pai_mae_1', label: 'Nome Pai/Mãe 1', placeholder: 'Nome' }, { id: 'id_pai_mae_1', label: 'ID do Requerente 1', placeholder: 'XXXX' }, { type: 'seccao', label: 'Responsável 2' }, { id: 'pai_mae_2', label: 'Nome Pai/Mãe 2', placeholder: 'Nome' }, { id: 'id_pai_mae_2', label: 'ID do Requerente 2', placeholder: 'XXXX' }, { id: 'data_nasc_adoc', label: 'Data Nascimento|Adoção', placeholder: 'XX/XX/2026', valorFixo: '21/06/2026' }, { type: 'seccao', label: 'Fechamento' }, { id: 'valor', label: 'Valor', placeholder: 'XXXXXXXXXXXXXXX' }, { id: 'data_req', label: 'Data Requerimento', placeholder: 'XX/XX/2026', valorFixo: '21/06/2026' } ],
            "2_nascimento": [ { id: 'nome_crianca', label: 'Nome Criança|Adulto', placeholder: 'Nome' }, { id: 'nome_retificado', label: 'Nome Retificado', placeholder: 'Nome' }, { id: 'id_req', label: 'ID do Requerente', placeholder: 'XXXX' }, { type: 'seccao', label: 'Responsáveis' }, { id: 'pai_mae_1', label: 'Nome Pai/Mãe 1', placeholder: 'Nome' }, { id: 'id_pai_mae_1', label: 'ID do Requerente 1', placeholder: 'XXXX' }, { id: 'pai_mae_2', label: 'Nome Pai/Mãe 2', placeholder: 'Nome' }, { id: 'id_pai_mae_2', label: 'ID do Requerente 2', placeholder: 'XXXX' }, { id: 'data_nasc_adoc', label: 'Data Nascimento|Adoção', placeholder: 'XX/XX/2026', valorFixo: '21/06/2026' }, { type: 'seccao', label: 'Médico' }, { id: 'medico', label: 'Nome do Médico', placeholder: 'NOME DO MÉDICO' }, { id: 'passaporte_medico', label: 'Passaporte Médico', placeholder: 'XXXX' }, { type: 'seccao', label: 'Fechamento' }, { id: 'valor', label: 'Valor', placeholder: 'XXXXXXXXXXXXXXX' }, { id: 'data_req', label: 'Data Requerimento', placeholder: 'XX/XX/2026', valorFixo: '21/06/2026' } ],
            "3": [ { type: 'seccao', label: 'Cônjuge 1' }, { id: 'c1_nome', label: 'Nome Completo Cônjuge 1', placeholder: 'Nome' }, { id: 'c1_id', label: 'ID 1', placeholder: 'XXXX' }, { id: 'c1_tel', label: 'Tel 1', placeholder: 'XXXX' }, { id: 'c1_idade', label: 'Idade 1', placeholder: 'XXXX' }, { id: 'c1_sexo', label: 'Sexo 1', placeholder: 'M/F' }, { type: 'seccao', label: 'Cônjuge 2' }, { id: 'c2_nome', label: 'Nome Completo Cônjuge 2', placeholder: 'Nome' }, { id: 'c2_id', label: 'ID 2', placeholder: 'XXXX' }, { id: 'c2_tel', label: 'Tel 2', placeholder: 'XXXX' }, { id: 'c2_idade', label: 'Idade 2', placeholder: 'XXXX' }, { id: 'c2_sexo', label: 'Sexo 2', placeholder: 'M/F' }, { type: 'seccao', label: 'Fechamento' }, { id: 'valor', label: 'Valor', placeholder: 'XXXXXXXXXXXXXXX' }, { id: 'data', label: 'Data', placeholder: '23/02/2025', valorFixo: '23/02/2025' } ],
            "4": [ { id: 'empresa', label: 'Empresa', placeholder: 'Nome da Empresa' }, { id: 'socio1', label: 'Sócio 01', placeholder: 'Nome' }, { id: 'pass_socio1', label: 'Passaporte Sócio 01', placeholder: 'XXXX' }, { id: 'tel_socio1', label: 'Tel Sócio 01', placeholder: 'XXXX' }, { id: 'socio2', label: 'Sócio 02', placeholder: 'Nome' }, { id: 'pass_socio2', label: 'Passaporte Sócio 02', placeholder: 'XXXX' }, { id: 'tel_socio2', label: 'Tel Sócio 02', placeholder: 'XXXX' }, { id: 'solicitacao', label: 'Solicitação', placeholder: 'ABERTURA | RENOVAÇÃO' }, { id: 'num_func', label: 'Nº Funcionários', placeholder: 'Empresas 20' }, { id: 'descricao', label: 'Descrição', placeholder: 'XXXX' }, { id: 'valor', label: 'Valor', placeholder: 'XXXXXXXXXXXXXXX' }, { id: 'data', label: 'Data', placeholder: '23/02/2025', valorFixo: '23/02/2025' } ],
            "5": [ { id: 'nome_completo', label: 'Nome', placeholder: 'Nome' }, { id: 'id_req', label: 'ID', placeholder: 'XXXX' }, { id: 'telefone', label: 'Telefone', placeholder: 'XXXX' }, { id: 'requerimento', label: 'Requerimento (Pena)', placeholder: '0M' }, { id: 'motivo', label: 'Motivo', placeholder: 'XXXX' }, { id: 'data', label: 'Data', placeholder: '23/02/2025', valorFixo: '23/02/2025' } ],
            "6": [ { id: 'nome_completo', label: 'Nome', placeholder: 'Nome' }, { id: 'id_req', label: 'ID', placeholder: 'XXXX' }, { id: 'telefone', label: 'Telefone', placeholder: 'XXXX' }, { id: 'requerimento', label: 'Requerimento', placeholder: '0M' }, { id: 'armamento', label: 'Armamento', placeholder: 'XXXX' }, { id: 'motivo', label: 'Motivo', placeholder: 'XXXX' }, { id: 'data', label: 'Data', placeholder: '21/06/2026', valorFixo: '21/06/2026' } ]
        };

        function alternarCampos() {
            const escolha = document.getElementById('select-template').value;
            const container = document.getElementById('campos-dinamicos');
            container.innerHTML = '';
            document.getElementById('area-ocr').classList.toggle('hidden', !["5", "6"].includes(escolha));
            layouts[escolha].forEach(campo => {
                if(campo.type === 'seccao') {
                    container.innerHTML += `<div class="seccao-divisor"><h3>${campo.label}</h3></div>`;
                } else {
                    container.innerHTML += `<div class="grupo-campo"><label>${campo.label}</label><input type="text" id="input-${campo.id}" value="${campo.valorFixo || ''}" placeholder="${campo.placeholder}"></div>`;
                }
            });
        }

        function processarImagem(event) {
            const file = event.target.files[0];
            const statusDiv = document.getElementById('status-ocr');
            if (!file) return;
            statusDiv.innerText = "🔄 Analisando...";
            Tesseract.recognize(file, 'por+eng').then(({ data: { text } }) => {
                const regexMeses = /(\d+)\s*(?:M|m|meses|mes)/g;
                let total = 0;
                let m;
                while ((m = regexMeses.exec(text)) !== null) total += parseInt(m[1]);
                document.getElementById('input-requerimento').value = total + 'M';
                statusDiv.innerText = `✅ Sucesso: ${total}M`;
            });
        }

        function gerarTemplate() {
            const adv = document.getElementById('adv-nome').value;
            let res = `**Advogado:** ${adv}\n\n\`\`\`md\n`;
            document.querySelectorAll('#campos-dinamicos input').forEach(el => {
                const label = el.parentElement.querySelector('label').innerText;
                res += `[${label.toUpperCase()}][${el.value}]\n`;
            });
            document.getElementById('output-template').value = res + "\`\`\`";
        }

        async function enviarParaDiscord() {
            const content = document.getElementById('output-template').value;
            if(!content) return;
            await fetch(webhookPadrao, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ content: content }) 
            });
            alert('Enviado!');
        }

        function copiarTexto() { document.getElementById('output-template').select(); document.execCommand('copy'); alert('Copiado!'); }
        alternarCampos();
    </script>
</body>
</html>
