<style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #061426; color: #cbd5e1; font-family: system-ui, -apple-system, sans-serif; padding: 1rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 1rem; border-bottom: 1px solid #16395f; padding-bottom: 0.75rem; }
        h1 { color: #f5c45c; font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
        header p { color: #c9d8e8; font-size: 0.875rem; }
        
        .grid-principal { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 1180px) { 
            .grid-principal { grid-template-columns: 420px minmax(620px, 1fr); align-items: start; }
        }
        
        .card { background-color: #0b2340; padding: 1rem; border-radius: 0.75rem; border: 1px solid #16395f; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); margin-bottom: 1rem; }
        h2 { font-size: 1.125rem; font-weight: 600; color: #f5c45c; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .grupo-campo { margin-bottom: 0.75rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #c9d8e8; margin-bottom: 0.35rem; tracking: 0.05em; }
        input, select, textarea { width: 100%; background-color: #16395f; border: 1px solid #2d5c88; border-radius: 0.5rem; padding: 0.65rem; font-size: 0.875rem; color: #fff; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #f5c45c; }
        
        .campos-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
        @media (min-width: 640px) { .campos-grid { grid-template-columns: 1fr 1fr; } }
        .full-width { grid-column: span 1 / span 1; }
        @media (min-width: 640px) { .full-width { grid-column: span 2 / span 2; } }
        
        .seccao-divisor {
            grid-column: span 1 / span 1;
            border-bottom: 1px solid #16395f;
            padding-bottom: 0.35rem;
            margin-top: 1.25rem;
            margin-bottom: 0.25rem;
        }
        @media (min-width: 640px) { .seccao-divisor { grid-column: span 2 / span 2; } }
        .seccao-divisor h3 {
            color: #f5c45c;
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .btn-gerar { background-color: #b8862b; color: white; width: 100%; padding: 0.85rem; border: none; border-radius: 0.5rem; font-weight: 700; font-size: 0.875rem; cursor: pointer; margin-top: 1rem; transition: background 0.2s; text-transform: uppercase; }
        .btn-gerar:hover { background-color: #d6a84a; }
        
        .flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .btn-copiar { background-color: #16395f; color: white; border: 1px solid #2d5c88; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .btn-copiar:hover { background-color: #2d5c88; }
        
        #output-template { background-color: #020b16; color: #f8fafc; font-family: monospace; font-size: 0.78rem; padding: 0.85rem; border-radius: 0.5rem; border: 1px solid #0b2340; resize: vertical; height: 420px; min-height: 320px; max-height: calc(100vh - 360px); overflow: auto; }
        .hidden { display: none !important; }


        /* Estilização moderna para o Toast Banner de Cópia */
        #toast-copy {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: #b8862b;
            color: #ffffff;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 700;

            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        #toast-copy.show {

        @media (min-width: 1180px) {

        .card {

        }

            opacity: 0.65;

</head>

        function obterMesAtualNome() {
            const meses = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
            return meses[new Date().getMonth()];
        }

        function formatarDolar(num) {
            return '$' + Number(num || 0).toLocaleString('pt-BR');
        }

        function obterDataAtualBR() {
            const hoje = new Date();
            const dia = String(hoje.getDate()).padStart(2, '0');
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const ano = hoje.getFullYear();
            return `${dia}/${mes}/${ano}`;
        }

        function alternarCampos() {
            const escolha = document.getElementById('select-template').value;
            const container = document.getElementById('campos-dinamicos');
            container.innerHTML = '';

            layouts[escolha].forEach(campo => {
                if (campo.type === 'seccao') {
                    const divisor = document.createElement('div');
                    divisor.className = 'seccao-divisor';
                    divisor.id = campo.id || `seccao-${campo.label.replace(/\s+/g, '-').toLowerCase()}`;
                    const h3 = document.createElement('h3');
                    h3.innerText = campo.label;
                    divisor.appendChild(h3);
                    container.appendChild(divisor);
                    return;
                }

                const div = document.createElement('div');
                div.id = `container-${campo.id}`;
                if (campo.id === 'descricao' || campo.id === 'motivo') {
                    div.className = 'full-width';
                }

                const label = document.createElement('label');
                label.innerText = campo.label;
                div.appendChild(label);

                if (campo.type === 'select') {
                    const input = document.createElement('select');
                    input.id = `input-${campo.id}`;

                    if (campo.id === 'ficha_limpa') {
                        input.onchange = handleFichaLimpaChange;
                    }
                    if (campo.id === 'faixa_limpeza') {
                        input.onchange = calcularValorLimpeza;
                    }
                    if (campo.id === 'tipo_divorcio') {
                        input.onchange = atualizarCamposDivorcio;
                    }
                    if (campo.id === 'solicitacao' || campo.id === 'tipo_empresa') {
                        input.onchange = () => { atualizarCamposCNPJ(); atualizarValorCNPJ(); };
                    }

                    campo.options.forEach(opt => {
                        const optionElement = document.createElement('option');
                        optionElement.value = opt;
                        optionElement.innerText = opt;
                        input.appendChild(optionElement);
                    });

                    div.appendChild(input);
                } else if (campo.type === 'checkboxes') {
                    const wrapCheckboxes = document.createElement('div');
                    wrapCheckboxes.style.display = 'flex';
                    wrapCheckboxes.style.gap = '1.25rem';
                    wrapCheckboxes.style.marginTop = '0.5rem';
                    wrapCheckboxes.style.flexWrap = 'wrap';

                    campo.options.forEach(opt => {
                        const itemLabel = document.createElement('label');
                        itemLabel.style.display = 'flex';
                        itemLabel.style.alignItems = 'center';
                        itemLabel.style.gap = '0.5rem';
                        itemLabel.style.fontSize = '0.875rem';
                        itemLabel.style.textTransform = 'none';
                        itemLabel.style.cursor = 'pointer';
                        itemLabel.style.color = '#fff';

                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.name = campo.id;
                        checkbox.value = opt;
                        checkbox.style.width = 'auto';

                        itemLabel.appendChild(checkbox);
                        itemLabel.appendChild(document.createTextNode(opt));
                        wrapCheckboxes.appendChild(itemLabel);
                    });

                    div.appendChild(wrapCheckboxes);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = `input-${campo.id}`;
                    input.placeholder = campo.placeholder;
                    input.value = campo.valorFixo || '';

                    if (campo.id.toLowerCase().includes('data')) {
                        input.value = obterDataAtualBR();
                    }

                    if (campo.id.includes('id')) {
                        input.inputMode = 'numeric';
                        input.pattern = '[0-9]*';
                        input.addEventListener('input', () => {
                            input.value = input.value.replace(/[^0-9]/g, '');
                        });
                    }

                    if (campo.id.includes('tel') || campo.id === 'telefone') {
                        input.inputMode = 'numeric';
                        input.maxLength = 7;
                        input.placeholder = 'XXX-XXX';
                        input.addEventListener('input', () => {
                            let numeros = input.value.replace(/[^0-9]/g, '').slice(0, 6);
                            if (numeros.length > 3) {
                                input.value = numeros.slice(0, 3) + '-' + numeros.slice(3);
                            } else {
                                input.value = numeros;
                            }
                        });
                    }

                    if (campo.id === 'data') {
                        input.placeholder = 'XX/XX/20XX';
                        input.maxLength = 10;

                        input.addEventListener('input', () => {
                            let numeros = input.value.replace(/[^0-9]/g, '').slice(0, 8);

                            if (numeros.length > 4) {
                                input.value = numeros.slice(0,2) + '/' + numeros.slice(2,4) + '/' + numeros.slice(4);
                            } else if (numeros.length > 2) {
                                input.value = numeros.slice(0,2) + '/' + numeros.slice(2);
                            } else {
                                input.value = numeros;
                            }
                        });
                    }

                    if (campo.readonly) {
                        input.readOnly = true;
                        input.style.backgroundColor = '#0b2340';
                        input.style.borderColor = '#2d5c88';
                        input.style.color = '#f5c45c';
                    }

                    div.appendChild(input);
                }

                container.appendChild(div);
            });

            if (escolha === "1" || escolha === "6") {
                handleFichaLimpaChange();
            }

            if (escolha === "1" || escolha === "5" || escolha === "6") {
                calcularValorLimpeza();
            }

            
            if (escolha === "4") {
                atualizarCamposCNPJ();
                atualizarValorCNPJ();
            }
            if (escolha === "7") {
                atualizarCamposDivorcio();
            }



            setTimeout(gerarTemplate, 0);
        }

        function handleFichaLimpaChange() {
            const escolha = document.getElementById('select-template').value;
            if (escolha !== "1" && escolha !== "6") return;

            const fichaLimpaVal = document.getElementById('input-ficha_limpa')?.value;

            // Troca de Nome: se ficha suja, integra limpeza no mesmo requerimento.
            if (escolha === "1") {
                const camposLimpeza = [
                    'faixa_limpeza',
                    'valor_limpeza',
                    'valor_adv_limpeza',
                    'valor_jur_limpeza',
                    'total_adv_processo',
                    'total_jur_processo'
                ];

                camposLimpeza.forEach(id => {
                    const container = document.getElementById(`container-${id}`);
                    if (!container) return;

                    if (fichaLimpaVal === "Não") {
                        container.classList.remove('hidden');
                    } else {
                        container.classList.add('hidden');
                    }
                });

                calcularValorLimpeza();
                return;
            }

            // Porte de Arma: se ficha suja, integra limpeza no mesmo requerimento.
            if (escolha === "6") {
                const camposLimpeza = [
                    'faixa_limpeza',
                    'valor_limpeza',
                    'valor_adv_limpeza',
                    'valor_jur_limpeza'
                ];

                camposLimpeza.forEach(id => {
                    const container = document.getElementById(`container-${id}`);
                    if (!container) return;

                    if (fichaLimpaVal === "Não") {
                        container.classList.remove('hidden');
                    } else {
                        container.classList.add('hidden');
                    }
                });

                if (fichaLimpaVal === "Não") {
                    calcularValorLimpeza();
                }
            }

            atualizarVisibilidadeOCR();
        }

        function atualizarVisibilidadeOCR() {
            const areaOcr = document.getElementById('area-ocr');
            if (areaOcr) areaOcr.classList.add('hidden');
        }

        // Eventos para recalcular divisões financeiras ao introduzir valores
function atualizarCamposCNPJ() {
            const escolha = document.getElementById('select-template').value;
            if (escolha !== "4") return;

            const solicitacao = document.getElementById('input-solicitacao')?.value;
            const esconderSocios = solicitacao === 'RENOVAÇÃO';

            const secoesSocios = ['secao-socio1', 'secao-socio2'];
            const camposSocios = [
                'socio1','id_socio1','tel_socio1',
                'socio2','id_socio2','tel_socio2'
            ];

            [...secoesSocios, ...camposSocios.map(id => `container-${id}`)].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                if (esconderSocios) {
                    el.classList.add('hidden');
                } else {
                    el.classList.remove('hidden');
                }
            });

            const campoMes = document.getElementById('input-mes_vigente');
            if (campoMes && !campoMes.value) {
                campoMes.value = obterMesAtualNome();
            }
        }

        function atualizarValorCNPJ() {
            const escolha = document.getElementById('select-template').value;
            if (escolha !== "4") return;

            const solicitacao = document.getElementById('input-solicitacao')?.value;
            const tipoEmpresa = document.getElementById('input-tipo_empresa')?.value;
            const valorInput = document.getElementById('input-valor');

            if (!solicitacao || !tipoEmpresa || !valorInput) return;

            const tabela = {
                "ABERTURA": {
                    "Restaurante": 100000,
                    "Empresas": 120000,
                    "Restaurante +5": 200000,
                    "Empresa +5": 220000
                },
                "RENOVAÇÃO": {
                    "Restaurante": 80000,
                    "Empresas": 100000,
                    "Restaurante +5": 150000,
                    "Empresa +5": 170000
                }
            };

            const valor = tabela[solicitacao]?.[tipoEmpresa] || 0;
            valorInput.value = valor > 0 ? formatarDolar(valor) : '';

            calcularValores();

            if (document.getElementById('output-template')) {
                setTimeout(gerarTemplate, 0);
            }
        }

        function atualizarCamposDivorcio() {
            const escolha = document.getElementById('select-template').value;
            if (escolha !== "7") return;

            const tipo = document.getElementById('input-tipo_divorcio')?.value || 'Amigável';
            const amigavel = tipo === 'Amigável';

            const idsAmigavel = [
                'secao-divorcio-amigavel',
                'container-div_nome_req1',

                'container-data_separacao'

                'container-div_id_req',

            idsAmigavel.forEach(id => {

            });

            idsLitigioso.forEach(id => {
                const el = document.getElementById(id);

            });

            calcularValores();

            if (document.getElementById('output-template')) {
                setTimeout(gerarTemplate, 0);
            }

        function calcularValores() {
            const escolha = document.getElementById('select-template').value;
            const valorInput = document.getElementById('input-valor');
            if (!valorInput) return;

            // Remove símbolos e pontos da digitação livre do utilizador
            let valorTexto = valorInput.value.replace(/[^0-9]/g, '');
            let valorNum = parseInt(valorTexto, 10) || 0;

            let pctAdv = 0.50;
            let pctJur = 0.50;

            // Regra especial CNPJ (4)
            if (escolha === "4") {
                const solicitacao = document.getElementById('input-solicitacao')?.value;
                if (solicitacao === "RENOVAÇÃO") {
                    pctAdv = 0.40;
                    pctJur = 0.60;
                } else { // ABERTURA ou AUMENTO DE FUNCIONARIOS
                    pctAdv = 0.60;
                    pctJur = 0.40;
                }
            }

            const valorAdv = Math.round(valorNum * pctAdv);
            const valorJur = Math.round(valorNum * pctJur);

            const formatarNumero = (num) => {
                return formatarDolar(num);
            };

            const advInput = document.getElementById('input-valor_adv');
            const jurInput = document.getElementById('input-valor_jur');
            
            if (advInput) advInput.value = valorAdv > 0 ? `${formatarNumero(valorAdv)}` : '';
            if (jurInput) jurInput.value = valorJur > 0 ? `${formatarNumero(valorJur)}` : '';

            if (document.getElementById('output-template')) {
                setTimeout(gerarTemplate, 0);
            }
        }

        function calcularValorLimpeza() {
            const escolha = document.getElementById('select-template').value;
            const faixaInput = document.getElementById('input-faixa_limpeza');
            const valorInput = document.getElementById('input-valor_limpeza');
            const valorAdvInput = document.getElementById('input-valor_adv_limpeza');
            const valorJurInput = document.getElementById('input-valor_jur_limpeza');
            const totalAdvInput = document.getElementById('input-total_adv_processo');
            const totalJurInput = document.getElementById('input-total_jur_processo');

            const valorTrocaNome = 65000;
            let valorLimpeza = 0;
            let valorAdvLimpeza = 0;
            let valorJurLimpeza = 0;

            if (faixaInput && valorInput) {
                const faixa = faixaInput.value || '≤ 150 meses preso';

                if (faixa.includes('500')) {
                    valorLimpeza = 150000;
                } else if (faixa.includes('300')) {
                    valorLimpeza = 100000;
                } else {
                    valorLimpeza = 50000;
                }

                valorAdvLimpeza = Math.round(valorLimpeza * 0.70);
                valorJurLimpeza = Math.round(valorLimpeza * 0.30);
            }

            const formatar = (num) => formatarDolar(num);

            if (valorInput) valorInput.value = formatar(valorLimpeza || 50000);
            if (valorAdvInput) valorAdvInput.value = formatar(valorAdvLimpeza || 35000);
            if (valorJurInput) valorJurInput.value = formatar(valorJurLimpeza || 15000);

            if (escolha === "1") {
                const fichaLimpaVal = document.getElementById('input-ficha_limpa')?.value;

                if (fichaLimpaVal === "Não") {
                    if (totalAdvInput) totalAdvInput.value = formatar(valorTrocaNome + valorAdvLimpeza);
                    if (totalJurInput) totalJurInput.value = formatar(valorJurLimpeza);
                } else {
                    if (totalAdvInput) totalAdvInput.value = formatar(valorTrocaNome);
                    if (totalJurInput) totalJurInput.value = '0';
                }
            }

            if (document.getElementById('output-template')) {
                setTimeout(gerarTemplate, 0);
            }
        }

        async function enviarDiscord() {
            gerarTemplate();

            const textarea = document.getElementById('output-template');
            const botao = document.querySelector('.btn-enviar');
            const conteudo = textarea.value.trim();

            if (!conteudo) {
                alert('Nenhum template foi gerado para enviar.');
                return;
            }

            try {
                if (botao) {
                    botao.disabled = true;
                    botao.innerText = 'Enviando...';
                }

                const resposta = await fetch('https://discord.com/api/webhooks/1518518550929870919/03El7VWev97nZVpyAlkTIKkNVj3Ucz5NN7JvdPthOaI2wL-NGmJe7mhyxSnMpUoNlGSL', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: conteudo
                    })
                });

                if (!resposta.ok) {
                    throw new Error('Falha ao enviar para o Discord.');
                }

                const toast = document.getElementById('toast-copy');
                toast.innerHTML = '<span>✅</span> Template enviado com sucesso para o Discord!';
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.innerHTML = '<span>✅</span> Modelo copiado com sucesso para colar no Discord!';
                }, 3000);
            } catch (erro) {
                alert('Erro ao enviar para o Discord. Verifique o webhook ou tente novamente.');

                if (botao) {
                    botao.disabled = false;
                    botao.innerText = '📨 Enviar';
                }
            }
        }
